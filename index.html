<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaptionAI - Instant Instagram Captions</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 800px; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="container bg-white p-8 rounded shadow-md w-full">
        <h1 class="text-3xl font-bold mb-6 text-center">CaptionAI</h1>
        <p class="text-center text-gray-600 mb-8">Generate engaging Instagram captions instantly!</p>
        <form id="caption-form" class="space-y-4">
            <div>
                <label for="keywords" class="block text-sm font-medium text-gray-700">Keywords/Themes:</label>
                <input type="text" id="keywords" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., coffee, productivity, sunny day" required>
            </div>
            <div>
                <label for="tone" class="block text-sm font-medium text-gray-700">Tone:</label>
                <select id="tone" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                    <option>Enthusiastic</option>
                    <option>Inspirational</option>
                    <option>Humorous</option>
                    <option>Informative</option>
                    <option>Casual</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Generate Caption
            </button>
        </form>
        <div id="result" class="mt-8 p-4 bg-gray-50 rounded hidden">
            <h2 class="text-xl font-semibold mb-2">Your Caption:</h2>
            <p id="output-caption" class="text-gray-800 whitespace-pre-wrap"></p>
            <button id="checkout-btn" class="mt-4 w-full bg-green-600 text-white p-2 rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 hidden">Purchase Full Access</button>
        </div>
    </div>
    <script>
        document.getElementById('caption-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const resultDiv = document.getElementById('result');
            const outputCaption = document.getElementById('output-caption');
            const checkoutBtn = document.getElementById('checkout-btn');

            outputCaption.textContent = 'Generating...';
            resultDiv.classList.remove('hidden');
            checkoutBtn.classList.add('hidden');

            try {
                // This would be replaced with an actual API call to your Vercel Function
                // For demo purposes, we'll simulate a response.
                const response = await new Promise(resolve => setTimeout(() => {
                    resolve({ caption: `Here's a sample caption about ${keywords} with an ${tone} tone! #${keywords.replace(/\s/g, '').toLowerCase()} #${tone.toLowerCase()} (Generated by AI)` });
                }, 1500));
                
                outputCaption.textContent = response.caption;
                // In a real app, you'd track free vs. paid usage and show checkout
                checkoutBtn.classList.remove('hidden'); 
            } catch (error) {
                outputCaption.textContent = 'Error generating caption. Please try again.';
                console.error('Error:', error);
            }
        });

        document.getElementById('checkout-btn').addEventListener('click', async () => {
            // Integrate Stripe Checkout here
            alert('Redirecting to Stripe Checkout! (Simulated)');
            // In a real app, you'd call a backend endpoint to create a Stripe Checkout session
            // window.location.href = 'YOUR_STRIPE_CHECKOUT_URL';
        });
    </script>
</body>
</html>
